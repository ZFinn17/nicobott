<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/chatbot.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>NicoBot — SMK ICB Cinta Niaga</title>

    <style>
      /* ============================================================
         Base — konsisten dengan website: f5f5f7 background
         ============================================================ */
      body {
        font-family: "Inter", sans-serif;
        background: #f5f5f7;
        min-height: 100vh;
      }

      /* ============================================================
         LAYOUT UTAMA
         Navbar (57px) + grid dua kolom
         ============================================================ */
      .chat-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: calc(100vh - 57px);
      }

      @media (max-width: 768px) {
        .chat-layout {
          grid-template-columns: 1fr;
        }
        .chat-sidebar {
          display: none;
        }
      }

      /* ============================================================
         SIDEBAR
         Putih bersih dengan border kanan — konsisten dengan
         card-card di profile.html (bg-white + border-slate-200)
         ============================================================ */
      .chat-sidebar {
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        padding: 1.5rem 1.25rem;
        gap: 1.5rem;
        overflow-y: auto;
      }

      /* Brand di sidebar */
      .sidebar-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid #f1f5f9;
      }

      .sidebar-brand-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #172554; /* blue-950 */
        border: 2px solid #fbbf24; /* amber-400 */
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .sidebar-title {
        font-size: 1rem;
        font-weight: 700;
        color: #172554;
        line-height: 1.2;
      }

      .sidebar-sub {
        font-size: 0.72rem;
        color: #64748b;
        margin-top: 0.1rem;
        line-height: 1.4;
      }

      /* Status online */
      .sidebar-status {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.78rem;
        font-weight: 500;
        color: #16a34a;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        animation: pulse 2s ease-in-out infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(0.85);
        }
      }

      /* Section label sidebar */
      .sidebar-section-label {
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #94a3b8;
        margin-bottom: 0.5rem;
      }

      /* Tombol topik — konsisten dengan quick-btn tapi full width */
      .topic-btn {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 0.625rem;
        border: 1px solid transparent;
        background: transparent;
        color: #334155;
        font-size: 0.82rem;
        font-family: "Inter", sans-serif;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .topic-btn:hover {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #172554;
      }

      .topic-btn:hover .topic-icon {
        background: #172554;
        color: #fbbf24;
      }

      .topic-icon {
        width: 28px;
        height: 28px;
        border-radius: 0.4rem;
        background: #f1f5f9;
        color: #475569;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.78rem;
        flex-shrink: 0;
        transition: all 0.15s;
      }

      /* Kontak WhatsApp di bawah sidebar */
      .sidebar-contact {
        margin-top: auto;
        padding: 0.875rem;
        border-radius: 0.875rem;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-left: 3px solid #172554;
      }

      .sidebar-contact p {
        font-size: 0.75rem;
        color: #64748b;
        line-height: 1.6;
      }

      .sidebar-contact a {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        margin-top: 0.6rem;
        background: #16a34a;
        color: white;
        font-size: 0.78rem;
        font-weight: 500;
        padding: 0.4rem 0.875rem;
        border-radius: 9999px;
        text-decoration: none;
        transition: background 0.15s;
        font-family: "Inter", sans-serif;
      }

      .sidebar-contact a:hover {
        background: #15803d;
      }

      /* ============================================================
         AREA CHAT UTAMA
         ============================================================ */
      .chat-main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f5f5f7;
      }

      /* Sub-header chat — putih dengan border bawah */
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.875rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        background: #ffffff;
        flex-shrink: 0;
        box-shadow: 0 1px 3px rgba(23, 37, 84, 0.04);
      }

      .chat-header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .chat-header-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #172554;
        border: 2px solid #fbbf24;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ============================================================
         AREA PESAN
         ============================================================ */
      #nicobot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* Scrollbar — tipis & selaras */
      #nicobot-messages::-webkit-scrollbar {
        width: 4px;
      }
      #nicobot-messages::-webkit-scrollbar-track {
        background: transparent;
      }
      #nicobot-messages::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      /* ============================================================
         QUICK REPLIES BAR
         ============================================================ */
      #nicobot-quick-replies {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        border-top: 1px solid #e2e8f0;
        background: #ffffff;
        flex-shrink: 0;
      }

      /* ============================================================
         INPUT BAR
         ============================================================ */
      .chat-input-bar {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.875rem 1.5rem;
        border-top: 1px solid #e2e8f0;
        background: #ffffff;
        flex-shrink: 0;
        box-shadow: 0 -1px 3px rgba(23, 37, 84, 0.04);
      }

      #nicobot-input {
        flex: 1;
        background: #f8fafc;
        border: 1.5px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0.65rem 1rem;
        color: #1e293b;
        font-size: 0.875rem;
        font-family: "Inter", sans-serif;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      #nicobot-input::placeholder {
        color: #94a3b8;
      }

      #nicobot-input:focus {
        border-color: #172554;
        box-shadow: 0 0 0 3px rgba(23, 37, 84, 0.08);
        background: #ffffff;
      }

      /* Tombol kirim — blue-950 */
      #nicobot-send {
        width: 40px;
        height: 40px;
        border-radius: 0.75rem;
        background: #172554;
        color: white;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.15s,
          transform 0.1s;
        flex-shrink: 0;
      }

      #nicobot-send:hover {
        background: #1e3a8a;
      }
      #nicobot-send:active {
        transform: scale(0.95);
      }
      #nicobot-send:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }

      /* ============================================================
         BUBBLE WIDTH — full page lebih lebar dari widget
         ============================================================ */
      .nicobot-bubble-bot {
        max-width: 72%;
      }
      .nicobot-bubble-user {
        max-width: 60%;
      }

      @media (max-width: 768px) {
        .nicobot-bubble-bot {
          max-width: 90%;
        }
        .nicobot-bubble-user {
          max-width: 82%;
        }
        #nicobot-messages {
          padding: 1rem;
        }
        .chat-input-bar {
          padding: 0.75rem 1rem;
        }
        #nicobot-quick-replies {
          padding: 0.6rem 1rem;
        }
      }

      /* ============================================================
         TOMBOL RESET
         ============================================================ */
      #nicobot-reset {
        width: 34px;
        height: 34px;
        border-radius: 0.5rem;
        background: transparent;
        border: 1px solid #e2e8f0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        transition: all 0.15s;
      }

      #nicobot-reset:hover {
        background: #f1f5f9;
        color: #172554;
        border-color: #cbd5e1;
      }
    </style>
  </head>

  <body>
    <!-- ===================== NAVBAR ===================== -->
    <nav
      class="fixed top-0 z-50 w-full bg-white flex flex-col md:flex-row justify-around border-b border-gray-300 p-3 items-center"
    >
      <h1 class="font-bold">SMK ICB Cinta Niaga</h1>
      <ul class="flex gap-3">
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="major.html">Major</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <a
        href="nicobot.html"
        class="bg-blue-950 text-white w-1/2 md:w-fit px-2.5 py-1.5 rounded-lg text-xs mt-2 md:mt-0 md:px-4.5 md:py-2 text-center underline underline-offset-5 font-bold"
      >
        Chat With Us
      </a>
    </nav>

    <!-- ===================== MAIN LAYOUT ===================== -->
    <div
      style="
        padding-top: 57px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      "
    >
      <div class="chat-layout" style="flex: 1; overflow: hidden">
        <!-- =============== SIDEBAR =============== -->
        <aside class="chat-sidebar">
          <!-- Brand -->
          <div class="sidebar-brand">
            <div class="sidebar-brand-avatar">
              <i
                class="fa-solid fa-robot"
                style="font-size: 0.875rem; color: #fbbf24"
              ></i>
            </div>
            <div>
              <p class="sidebar-title">NicoBot</p>
              <p class="sidebar-sub">Asisten resmi<br />SMK ICB Cinta Niaga</p>
            </div>
          </div>

          <!-- Status -->
          <div class="sidebar-status">
            <span class="status-dot"></span>
            Online — siap membantu
          </div>

          <!-- Topik -->
          <div>
            <p class="sidebar-section-label">Topik Tersedia</p>
            <div
              style="display: flex; flex-direction: column; gap: 0.2rem"
              id="sidebar-topics"
            ></div>
          </div>

          <!-- Kontak -->
          <div class="sidebar-contact">
            <p>Butuh bantuan lebih lanjut? Hubungi admin sekolah langsung.</p>
            <a
              href="https://wa.me/6281221049998"
              target="_blank"
              rel="noopener"
            >
              <i class="fa-brands fa-whatsapp"></i> WhatsApp Admin
            </a>
          </div>
        </aside>

        <!-- =============== AREA CHAT =============== -->
        <div class="chat-main">
          <!-- Sub-header -->
          <div class="chat-header">
            <div class="chat-header-left">
              <div class="chat-header-avatar">
                <i
                  class="fa-solid fa-robot"
                  style="font-size: 0.75rem; color: #fbbf24"
                ></i>
              </div>
              <div>
                <p
                  style="
                    color: #172554;
                    font-size: 0.875rem;
                    font-weight: 700;
                    line-height: 1.2;
                  "
                >
                  NicoBot
                </p>
                <p style="color: #64748b; font-size: 0.72rem; margin-top: 1px">
                  Ketik pertanyaan atau pilih topik di sidebar
                </p>
              </div>
            </div>
            <button
              id="nicobot-reset"
              title="Reset percakapan"
              aria-label="Reset percakapan"
            >
              <i class="fa-solid fa-rotate-right" style="font-size: 0.8rem"></i>
            </button>
          </div>

          <!-- Pesan -->
          <div id="nicobot-messages"></div>

          <!-- Quick replies -->
          <div id="nicobot-quick-replies"></div>

          <!-- Input -->
          <div class="chat-input-bar">
            <input
              id="nicobot-input"
              type="text"
              placeholder="Ketik pertanyaanmu di sini..."
              autocomplete="off"
              aria-label="Ketik pesan"
            />
            <button id="nicobot-send" aria-label="Kirim pesan">
              <i class="fa-solid fa-paper-plane" style="font-size: 0.8rem"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initChatbot } from "./src/chatbot.js";

      initChatbot();

      // ──────────────────────────────────────────────
      // Isi sidebar topik dari API quick-replies
      // ──────────────────────────────────────────────
      const TOPIC_ICONS = [
        "fa-book-open",
        "fa-file-pen",
        "fa-coins",
        "fa-school",
        "fa-clock",
        "fa-trophy",
        "fa-location-dot",
        "fa-bullseye",
      ];

      async function loadSidebarTopics() {
        try {
          const res = await fetch("/api/chat/quick-replies");
          const json = await res.json();
          const replies = json.data || json || [];
          const container = document.getElementById("sidebar-topics");
          if (!container) return;

          container.innerHTML = "";
          replies.forEach((r, i) => {
            const btn = document.createElement("button");
            btn.className = "topic-btn";
            btn.innerHTML = `
              <span class="topic-icon">
                <i class="fa-solid ${TOPIC_ICONS[i] || "fa-circle-info"}"></i>
              </span>
              <span>${r.label}</span>
            `;
            btn.addEventListener("click", () => {
              const qr = document.getElementById("nicobot-quick-replies");
              const input = document.getElementById("nicobot-input");
              const send = document.getElementById("nicobot-send");
              if (qr) qr.style.display = "none";
              if (input && send) {
                input.value = r.message || r.label;
                send.click();
              }
            });
            container.appendChild(btn);
          });
        } catch {
          // silent — bukan fitur kritis
        }
      }

      loadSidebarTopics();
    </script>
  </body>
</html>
